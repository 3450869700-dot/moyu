      <style>
        /* 基础样式重置 */
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        /* 容器使用视口单位，确保随窗口大小变化 */
        .button-container {
          position: relative;
          width: 100vw;
          height: 100vh;
          background-image: url("assets/images/back1.png");
          background-size: cover;
          background-position: center;
          overflow: hidden; /* 防止动画过程中出现滚动条 */
        }

        /* 图片按钮基础样式 - 核心动画配置 */
        .image-button {
          position: absolute;
          display: inline-block;
          background: transparent;
          border: none;
          padding: 0;
          opacity: 0; /* 初始透明 */
          /* 动画核心配置：干净急促收尾 */
          animation-iteration-count: 1;
          animation-fill-mode: forwards;

          animation-timing-function: cubic-bezier(0, 0, 0.2, 1);

          animation-duration: 0.15s;
          pointer-events: none;
          /* 可选：添加轻微缩放强化收尾（展开后瞬间定住） */
          transform-origin: center center; /* 扇形展开的原点，根据实际需求调整 */
          /* 添加阴影效果 - 使用drop-shadow使阴影贴合图片形状 */
          filter: drop-shadow(0 4px 6px rgba(70, 7, 7, 0.9));
          /* 设置z-index确保阴影在按钮下方，且不影响其他按钮 */
          z-index: 1;
        }

        /* 确保图片容器为相对定位，以便SVG覆盖层可以绝对定位 */
        .image-button a {
          position: relative;
          display: inline-block;
          pointer-events: none !important;
        }

        /* 确保没有链接的按钮容器也不可交互 */
        .image-button div {
          position: relative;
          display: inline-block;
          pointer-events: none !important;
        }

        /* 确保动画结束后，容器仍然不可交互 */
        .image-button.animation-ended a,
        .image-button.animation-ended div {
          pointer-events: none !important;
        }

        /* 图片本身设置为指针事件为none，确保点击事件只由SVG覆盖层处理 */
        .image-button img {
          pointer-events: none;
          user-select: none;
          -webkit-user-select: none;
          -moz-user-select: none;
          -ms-user-select: none;
        }

        /* 动画结束后，确保容器仍然不可交互 */
        .image-button.animation-ended a,
        .image-button.animation-ended div {
          pointer-events: none;
        }

        /* 交互覆盖层样式 */
        .interaction-overlay {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          /* 确保SVG覆盖层完全覆盖PNG图片 */
          object-fit: cover;
          /* 确保SVG覆盖层在PNG图片上方 */
          z-index: 2;
          /* 确保SVG覆盖层的背景透明，只保留路径作为交互区域 */
          background: transparent;
          /* 确保SVG本身也被裁剪 */
          overflow: visible;
          /* 允许SVG元素接收鼠标事件，但让路径决定具体的交互区域 */
          pointer-events: auto;
        }

        /* 确保SVG路径作为交互区域 */
        .interaction-overlay path {
          /* 保持路径填充为透明，但确保能够捕获鼠标事件 */
          fill: transparent;
          /* 确保路径能够捕获鼠标事件 */
          pointer-events: auto;
          /* 添加一个非常小的透明度，确保路径能够接收事件 */
          opacity: 0.01;
          /* 确保路径的形状就是交互区域 */
          cursor: pointer;
        }

        /* 悬停时路径保持透明 */
        .interaction-overlay:hover path {
          fill: transparent;
          opacity: 0.01;
        }

        /* 确保SVG覆盖层的容器也不可交互，只有SVG路径可交互 */
        .interaction-overlay svg {
          pointer-events: none;
        }

        /* 确保动画结束后，SVG覆盖层仍然可交互 */
        .image-button.animation-ended .interaction-overlay {
          pointer-events: auto;
        }

        /* 确保图片容器的宽度和高度由图片决定 */
        .image-button a,
        .image-button div {
          display: inline-block;
          position: relative;
          line-height: 0;
        }

        /* 确保图片占据容器的100%空间 */
        .image-button img {
          display: block;
          width: 100%;
          height: auto;
        }

        /* 确保只有SVG覆盖层可以触发悬停效果 */
        .image-button.animation-ended {
          pointer-events: none;
        }

        .image-button.animation-ended .interaction-overlay {
          pointer-events: auto;
          cursor: pointer;
        }

        /* 确保图片不被SVG覆盖层遮挡 */
        .image-button.animation-ended img {
          position: relative;
          transition: transform 0.4s ease-out !important;
          z-index: 1;
        }

        .image-button.animation-ended .interaction-overlay {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: 2;
        }

        /* 悬停效果类 - 直接应用到图片上，确保优先级最高 */
        .image-button.animation-ended img.hover-scale {
          transform: scale(1.1) !important;
          transition: transform 0.1s ease !important;
          z-index: 1 !important;
        }

        /* 为第6、7、8个按钮的hover效果单独处理，确保旋转和缩放同时生效 */
        .image-button:nth-child(6).animation-ended img.hover-scale {
          transform: scale(1.1) rotate(48deg) !important;
          transition: transform 0.1s ease !important;
        }

        .image-button:nth-child(7).animation-ended img.hover-scale {
          transform: scale(1.1) rotate(47deg) !important;
          transition: transform 0.1s ease !important;
        }

        .image-button:nth-child(8).animation-ended img.hover-scale {
          transform: scale(1.1) rotate(70deg) !important;
          transition: transform 0.1s ease !important;
        }

        /* 动画播放时，禁止鼠标事件和过渡效果 */
        .image-button:not(.animation-ended) {
          transition: none !important;
          pointer-events: none; /* 初始禁止 */
          cursor: default;
        }

        /* 动画结束后，确保按钮本身不可交互，只有SVG覆盖层可交互 */
        .image-button.animation-ended {
          pointer-events: none;
          cursor: default;
        }

        /* 确保动画结束后，SVG覆盖层仍然可交互 */
        .image-button.animation-ended .interaction-overlay {
          pointer-events: auto;
          cursor: pointer;
        }
        /* 链接样式 */
        .image-button a {
          display: inline-block;
          background: transparent;
          border: none;
          padding: 0;
          cursor: pointer;
        }

        /* 确保动画结束后链接也能交互 */
        .image-button.animation-ended a {
          pointer-events: auto;

        }

        /* 图片使用视口单位，确保随窗口大小变化 */
        .image-button img {
          display: block;
          background: transparent;
          border: none;
          padding: 0;

    <script>
      // 获取所有按钮
      const buttons = document.querySelectorAll(".image-button");
      console.log("Found buttons:", buttons.length);

      buttons.forEach((button, index) => {
        console.log("Button", index, ":", button);

        // 监听动画结束事件
        button.addEventListener("animationend", (e) => {
          console.log(
            "Animation ended for button",
            index,
            ":",
            e.animationName,
          );
          // 动画结束后，添加类名，启用hover
          button.classList.add("animation-ended");
          console.log("Added animation-ended class to button", index);
          console.log("Button classes:", button.className);
        });

        // 监听动画开始事件
        button.addEventListener("animationstart", (e) => {
          console.log(
            "Animation started for button",
            index,
            ":",
            e.animationName,
          );
        });

        // 强制添加animation-ended类，确保按钮可以交互
        setTimeout(() => {
          button.classList.add("animation-ended");
          console.log("Forced added animation-ended class to button", index);
          console.log("Button classes:", button.className);
        }, 500);
      });

      // 为每个SVG覆盖层添加悬停事件监听器
      setTimeout(() => {
        buttons.forEach((button, index) => {
          const overlay = button.querySelector(".interaction-overlay");
          const img = button.querySelector("img");
          const container = overlay ? overlay.parentElement : null;

          if (overlay && img && container) {
            // 确保容器有相对定位
            container.style.position = "relative";
            container.style.display = "inline-block";

            // 确保图片和SVG覆盖层的定位
            img.style.position = "relative";
            img.style.zIndex = "1";
            overlay.style.position = "absolute";
            overlay.style.top = "0";
            overlay.style.left = "0";
            overlay.style.width = "100%";
            overlay.style.height = "100%";
            overlay.style.zIndex = "2";

            // 监听鼠标进入事件
            overlay.addEventListener("mouseenter", () => {
              console.log(`按钮 ${index + 1} SVG覆盖层被悬停`);

              // 添加hover-scale类
              img.classList.add("hover-scale");
            });

            // 监听鼠标离开事件
            overlay.addEventListener("mouseleave", () => {
              console.log(`鼠标离开按钮 ${index + 1} SVG覆盖层`);

              // 移除hover-scale类
              img.classList.remove("hover-scale");
            });

            console.log(`已为按钮 ${index + 1} 添加悬停事件监听器`);
          }
        });
      }, 1000); // 等待动画结束后添加事件监听器
    </script>
